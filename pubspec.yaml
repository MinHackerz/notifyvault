name: notify_vault
description: "Never Lose a Notification Again"
publish_to: 'none'
version: 1.0.1+13

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Routing
  go_router: ^17.2.3

  # Database (Drift - SQLite)
  drift: ^2.24.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.24

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.4
  google_sign_in: ^7.2.0

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.3.1

  # UI
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  google_mobile_ads: ^9.0.0
  fl_chart: ^0.71.0

  # Utils
  intl: ^0.20.2
  timeago: ^3.7.0
  permission_handler: ^12.0.3
  package_info_plus: ^10.2.0
  device_info_plus: ^13.2.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  share_plus: ^13.1.0
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8
  hugeicons: ^1.1.7
  flutter_tts: ^4.2.5
  tutorial_coach_mark: ^1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  drift_dev: ^2.24.0
  json_serializable: ^6.9.4
  json_annotation: ^4.9.0

  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#F6F6F3"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  adaptive_icon_monochrome: "assets/icons/app_icon_dark.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
